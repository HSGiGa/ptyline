name = "nord-pill"

[palette]
"base.bg" = "#2e3440"
"base.fg" = "#eceff4"
accent = "#88c0d0"
ok = "#a3be8c"
warn = "#ebcb8b"
error = "#bf616a"
muted = "#4c566a"
command = "#d08770"
panel = "#3b4252"

[style.hostname]
fg = "base.bg"
bg = "accent"
bold = true
shape = "pill"
left_separator = " "
right_separator = " "
padding_left = 1
padding_right = 1

