name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.goos }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      # Native per platform — no cross-compilation. linux is pure Go and builds
      # from ubuntu with cgo off; darwin's metric modules use cgo (mach/IOKit) and
      # must build natively on macOS. Windows (ConPTY) is a deferred future feature
      # and is intentionally not built here. See CLAUDE.md / Makefile.
      matrix:
        include:
          - goos: linux
            runner: ubuntu-latest
            cgo: "0"
          - goos: darwin
            runner: macos-latest
            cgo: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: go build ./...

  test:
    name: test & vet (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      # Run natively on each host so build-tagged code (incl. the darwin cgo
      # modules and *_darwin_test.go) is actually exercised.
      matrix:
        runner: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go test -race ./...

  lint:
    name: format & lint
    # Runs on macOS so `make lint` can natively lint the darwin (cgo/IOKit)
    # files and cross-lint the pure-Go linux/windows paths in one pass — the
    # same command developers run locally. See the lint target in the Makefile.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: make fmt-check
      - run: make lint
