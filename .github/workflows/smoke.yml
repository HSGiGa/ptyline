name: Smoke

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.4"

jobs:
  terminal-contracts:
    name: terminal contracts (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: PTY exit-code smoke
        run: go test -count=1 -run 'TestWaitPropagatesExitCode|TestChildSizeReservesRows' ./internal/pty
      - name: ANSI/OSC terminal-safety smoke
        run: go test -count=1 -run 'Test(RIS|DECSTR|AltScreen|NormalScreen|OSC777|PartialSequence)' ./internal/proxy
      - name: Shell integration smoke
        run: go test -count=1 -run 'TestShellEmits|TestBashPromptCommandNotLeaked|TestCanonicalOSCRoundTrip' ./internal/shellintegration

