name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  GO_VERSION: "1.26.4"

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go test -race -shuffle=on ./...
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  goreleaser:
    name: goreleaser
    needs: verify
    # macOS runner: darwin builds natively with cgo, linux cross-compiles (pure Go).
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to HSGiGa/homebrew-tap so GoReleaser can commit
          # the updated formula there.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # Pin the tag explicitly from the push event. Without this, GoReleaser
          # resolves the release tag via `git describe`, which is ambiguous when
          # two tags point at the same commit (picks an arbitrary one instead of
          # the tag that actually triggered this run).
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
