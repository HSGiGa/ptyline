# golangci-lint configuration for ptyline.
# Run via `make lint` (requires golangci-lint installed).
version: "2"

run:
  tests: true

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - revive
    - misspell
    - unconvert
    - bodyclose
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
        - name: var-naming
          disabled: true
  exclusions:
    rules:
      # Scaffold stubs intentionally contain unused params / TODO bodies.
      # Remove these exclusions as packages are implemented.
      - linters: [revive, unused, errcheck]
        text: "TODO scaffold"
      # The terminal proxy and controller deliberately reserve parser/state fields
      # for implementation plans that have not run yet.
      - path: internal/(proxy|terminal)/
        linters: [unused]

formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
