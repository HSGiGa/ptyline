#:schema ./ptyline.schema.json
config_version = 1
shell = "auto"
refresh_interval_ms = 1000

[bar]
height = 2
mode = "single-line"
format = "ssh: {ssh} hostname: {hostname} {cwd} || {time}"
separator = " | "

[[bar.row]]
format = " {command} || || {git} "
fill = "─"

[[bar.row]]
format = "{ssh} || {user}@{hostname} {cwd} || {env} {runtime} {shell} || {gh} || {time}"

[icons]
preset = "ascii"
emoji_width = "auto"
fallback = true

[module.time]
format = "%H:%M:%S"
interval_ms = 1000

[module.gh]
source = "exec"
command = "gh api user --jq .login"
# interval_ms = 10000
# timeout_ms = 1000
# max_width = 60
# format = "{stdout}"
refresh_on_command = ["gh auth login", "gh auth logout", "gh auth refresh"]

[module.env]
env = ["PTYLINE_ENV"]

[module.cwd]
mode = "shell-integration"

[module.command]
enabled = true
format = "{active} {last} {exit} {duration}"
max_width = 60
done_min_duration_ms = 2000
done_success_ttl_ms = 3000
done_failure_ttl_ms = 0
animation = "glint"
animation_interval_ms = 80

[module.ssh]
enabled = true
animation = "pulse"
animation_interval_ms = 250
