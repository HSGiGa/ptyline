#:schema ./ptyline.schema.json
config_version = 1
shell = "auto"
refresh_interval_ms = 1000

[icons]
preset = "nerd-font"
emoji_width = "auto"
fallback = true

[bar]
separator = "|"

[[bar.row]]
format = " {command} || || {git} "
fill = "─"

[[bar.row]]
separator = ":"
format = "{cwd} || {cpu} {memory} {disk} {load} || {gh} | {time}"

[module.identity]
source = "template"
format = "{user}@{hostname} {cwd}"

[module.time]
format = "%H:%M:%S"
interval_ms = 1000

[module.gh]
source = "exec"
command = "gh api user --jq .login"
icon = "left"
icon_glyph = ""
icon_fallback = "gh"
# interval_ms = 10000
# timeout_ms = 1000
# max_width = 60
# format = "{stdout}"
refresh_on_command = ["gh auth login", "gh auth logout", "gh auth refresh"]

[module.env]
env = ["PTYLINE_ENV"]

[module.git]
icon = "left"
format = "{branch}{dirty} | {ahead} | {behind} | {conflict}"
separator = ":"

[module.cwd]
mode = "shell-integration"

[module.command]
enabled = true
format = "{active} {last} {exit} {duration}"
max_width = 60
done_min_duration_ms = 2000
done_success_ttl_ms = 3000
done_failure_ttl_ms = 0
animation = "glint"
animation_interval_ms = 80

[module.ssh]
enabled = true
animation = "pulse"
animation_interval_ms = 250

# System metrics. Probe-driven: each is hidden if its source is unavailable on
# this host (e.g. {battery} on a desktop/VM/WSL with no battery). Disabled by
# default — enabled here so they show in the bar above.
[module.cpu]
enabled = true
interval_ms = 2000
format = "cpu {percent}%"

[module.memory]
enabled = true
interval_ms = 5000
format = "mem {percent}%"

[module.disk]
enabled = true
interval_ms = 60000
format = "disk {percent}%"

[module.load]
enabled = true
interval_ms = 5000
format = "load {load1}"

# Add {battery} to a bar.row format to show it; hidden when no battery exists.
[module.battery]
enabled = true
interval_ms = 30000
format = "bat {percent}% {state}"
