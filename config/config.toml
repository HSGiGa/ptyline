#:schema ./config.schema.json
config_version = 1

[theme]

[icons]
preset = "nerd-font"

[bar]
separator = "|"
justify = "absolute_center"

[[bar.row]]
format = " {command} || || {git} "
fill = "─"

[[bar.row]]
separator = " · "
format = "{cwd} || {healh} {battery:>} || {uptime} | {time}"

[module.time]
format = "%H:%M:%S"
icon = "left"

[module.uptime]
source = "exec"
command = '''
    set -e
    if uptime -p >/dev/null 2>&1; then
        uptime -p
    else
        uptime
    fi
    '''
format = "{stdout}"
icon = "left"

[module.git]
icon = "left"
format = "{branch}{dirty} | {ahead} | {behind} | {conflict}"

[module.cwd]
mode = "shell-integration"
icon = "left"

[module.command]
icon = "left"
format = "{active} {last} {exit} {duration}"
animation = "glint"

[module.cpu]
format = "{percent}%"
icon = "left"

[module.memory]
format = "{percent}%"
icon = "left"

[module.disk]
format = "{percent}%"
icon = "left"

[module.load]
format = "{load1}"
icon = "left"

[module.battery]
format = "{percent}%"
icon = "left"

[module.healh]
source = "template"
format = "{cpu} | {memory} | {disk} | {load}"
